<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İşletme Kayıt - Flow Randevu</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --primary: #4F46E5;
    --primary-hover: #4338CA;
    --light-bg: #F3F4F6;
    --card-bg: #FFFFFF;
    --text-dark: #1F2937;
    --border: #E5E7EB;
    --success: #10B981;
    --error: #EF4444;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Segoe UI', sans-serif;
    background:var(--light-bg);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container {
    width:100%;
    max-width:500px;
}

.card {
    background:var(--card-bg);
    padding:35px 30px;
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

.header {
    text-align:center;
    margin-bottom:30px;
}

.header h2 {
    color:var(--text-dark);
    margin-bottom:5px;
}

.header p {
    color:#6B7280;
    font-size:14px;
}

.input-group {
    margin-bottom:16px;
}

.input-group label {
    display:block;
    margin-bottom:6px;
    font-size:13px;
    color:var(--text-dark);
    font-weight:500;
}

.input-group input,
.input-group select {
    width:100%;
    padding:12px 14px;
    border-radius:8px;
    border:1px solid var(--border);
    font-size:14px;
    background:white;
    transition:0.2s;
}

.input-group input:focus,
.input-group select:focus {
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(79,70,229,0.1);
}

.input-group select:disabled {
    background:#F3F4F6;
    color:#9CA3AF;
    cursor:not-allowed;
}

.row {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.save-btn {
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-top:10px;
}

.save-btn:hover:not(:disabled) {
    background:var(--primary-hover);
}

.save-btn:disabled {
    opacity:0.6;
    cursor:not-allowed;
}

.back {
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.back a {
    color:var(--primary);
    text-decoration:none;
    cursor:pointer;
}

#result {
    margin-top:15px;
    padding:12px;
    border-radius:8px;
    text-align:center;
    display:none;
    font-size:14px;
}

.success {
    background:#d1fae5;
    color:#065f46;
    border:1px solid #a7f3d0;
}

.error {
    background:#fee2e2;
    color:#991b1b;
    border:1px solid #fecaca;
}

.loading {
    display:inline-block;
    width:16px;
    height:16px;
    border:2px solid white;
    border-top-color:transparent;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin {
    to { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
<div class="card">

    <div class="header">
        <h2><i class="fa-solid fa-store"></i> İşletme Kayıt</h2>
        <p>İşletme bilgilerinizi girin</p>
    </div>

    <form id="isletmeForm" onsubmit="return kaydet();">
        
        <!-- İşletme Adı -->
        <div class="input-group">
            <label>İşletme Adı *</label>
            <input type="text" id="isletmeAdi" placeholder="Örn: Gökhan'ın Kuaförü" required>
        </div>

        <!-- Ülke (Sadece Türkiye) -->
        <div class="input-group">
            <label>Ülke *</label>
            <select id="ulke" required>
                <option value="1" selected>Türkiye</option>
            </select>
        </div>

        <!-- İl -->
        <div class="input-group">
            <label>İl *</label>
            <select id="il" required onchange="ilceYukle()">
                <option value="">İl Seçin</option>
            </select>
        </div>

        <!-- İlçe -->
        <div class="input-group">
            <label>İlçe *</label>
            <select id="ilce" required onchange="mahalleYukle()" disabled>
                <option value="">Önce İl Seçin</option>
            </select>
        </div>

        <!-- Mahalle -->
        <div class="input-group">
            <label>Mahalle *</label>
            <select id="mahalle" required disabled>
                <option value="">Önce İlçe Seçin</option>
            </select>
        </div>

        <!-- Cadde -->
        <div class="input-group">
            <label>Cadde</label>
            <input type="text" id="cadde" placeholder="Cadde adı">
        </div>

        <!-- Sokak -->
        <div class="input-group">
            <label>Sokak</label>
            <input type="text" id="sokak" placeholder="Sokak adı">
        </div>

        <!-- Bina Adı ve Kapı No -->
        <div class="row">
            <div class="input-group">
                <label>Bina Adı</label>
                <input type="text" id="binaAdi" placeholder="Bina">
            </div>
            <div class="input-group">
                <label>Kapı No</label>
                <input type="text" id="kapiNo" placeholder="No">
            </div>
        </div>

        <!-- Kat ve Daire -->
        <div class="row">
            <div class="input-group">
                <label>Kat</label>
                <input type="text" id="kat" placeholder="Kat">
            </div>
            <div class="input-group">
                <label>Daire</label>
                <input type="text" id="daire" placeholder="Daire">
            </div>
        </div>

        <!-- Hitap -->
        <div class="input-group">
            <label>Hitap *</label>
            <select id="hitap" required>
                <option value="">Seçin</option>
                <option value="Erkek">Erkek</option>
                <option value="Kadın">Kadın</option>
                <option value="Herkes">Herkes</option>
            </select>
        </div>

        <button type="submit" class="save-btn" id="kaydetBtn">
            <i class="fa-solid fa-save"></i> Kaydet
        </button>
    </form>

    <div id="result"></div>

    <div class="back">
        <a href="Isletme.html"><i class="fa-solid fa-arrow-left"></i> Geri Dön</a>
    </div>

</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhgT-OC7_px5CfPwOjaNLBP8JKwiVEFtUuTFw8m4m9xPFmErMAZGeQF9rxcrbzwIDSlA/exec';
let ilData = [];
let ilceData = [];
let mahalleData = [];

// Sayfa yüklenince
window.onload = function() {
    const userId = localStorage.getItem("userId");
    if (!userId) {
        window.location.href = "giris.html";
        return;
    }
    ilYukle();
};

// İl listesini yükle
async function ilYukle() {
    try {
        const formData = new FormData();
        formData.append('action', 'getIlList');

        const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
        const result = await response.json();

        if (result.success) {
            ilData = result.data;
            const ilSelect = document.getElementById('il');
            ilSelect.innerHTML = '<option value="">İl Seçin</option>';
            
            ilData.forEach(il => {
                const option = document.createElement('option');
                option.value = il.id;
                option.textContent = il.ad;
                ilSelect.appendChild(option);
            });
        }
    } catch (err) {
        console.error("İl yükleme hatası:", err);
    }
}

// İlçe listesini yükle
async function ilceYukle() {
    const ilId = document.getElementById('il').value;
    const ilceSelect = document.getElementById('ilce');
    const mahalleSelect = document.getElementById('mahalle');

    if (!ilId) {
        ilceSelect.disabled = true;
        ilceSelect.innerHTML = '<option value="">Önce İl Seçin</option>';
        mahalleSelect.disabled = true;
        mahalleSelect.innerHTML = '<option value="">Önce İlçe Seçin</option>';
        return;
    }

    try {
        const formData = new FormData();
        formData.append('action', 'getIlceList');
        formData.append('ilId', ilId);

        const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
        const result = await response.json();

        if (result.success) {
            ilceData = result.data;
            ilceSelect.innerHTML = '<option value="">İlçe Seçin</option>';
            
            ilceData.forEach(ilce => {
                const option = document.createElement('option');
                option.value = ilce.id;
                option.textContent = ilce.ad;
                ilceSelect.appendChild(option);
            });

            ilceSelect.disabled = false;
            mahalleSelect.disabled = true;
            mahalleSelect.innerHTML = '<option value="">Önce İlçe Seçin</option>';
        }
    } catch (err) {
        console.error("İlçe yükleme hatası:", err);
    }
}

// Mahalle listesini yükle
async function mahalleYukle() {
    const ilId = document.getElementById('il').value;
    const ilceId = document.getElementById('ilce').value;
    const mahalleSelect = document.getElementById('mahalle');

    if (!ilceId) {
        mahalleSelect.disabled = true;
        mahalleSelect.innerHTML = '<option value="">Önce İlçe Seçin</option>';
        return;
    }

    try {
        const formData = new FormData();
        formData.append('action', 'getMahalleList');
        formData.append('ilId', ilId);
        formData.append('ilceId', ilceId);

        const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
        const result = await response.json();

        if (result.success) {
            mahalleData = result.data;
            mahalleSelect.innerHTML = '<option value="">Mahalle Seçin</option>';
            
            mahalleData.forEach(mahalle => {
                const option = document.createElement('option');
                option.value = mahalle.id;
                option.textContent = mahalle.ad;
                mahalleSelect.appendChild(option);
            });

            mahalleSelect.disabled = false;
        }
    } catch (err) {
        console.error("Mahalle yükleme hatası:", err);
    }
}

// Kaydet
async function kaydet() {
    const userId = localStorage.getItem("userId");
    if (!userId) {
        showResult('Oturum süresi dolmuş!', 'error');
        return false;
    }

    const isletmeAdi = document.getElementById('isletmeAdi').value.trim();
    const ulkeId = document.getElementById('ulke').value;
    const ilId = document.getElementById('il').value;
    const ilceId = document.getElementById('ilce').value;
    const mahalleId = document.getElementById('mahalle').value;
    const hitap = document.getElementById('hitap').value;

    if (!isletmeAdi || !ilId || !ilceId || !mahalleId || !hitap) {
        showResult('Zorunlu alanları doldurun!', 'error');
        return false;
    }

    // Seçili isimleri bul
    const ilAd = ilData.find(i => i.id == ilId)?.ad || '';
    const ilceAd = ilceData.find(i => i.id == ilceId)?.ad || '';
    const mahalleAd = mahalleData.find(m => m.id == mahalleId)?.ad || '';

    const btn = document.getElementById("kaydetBtn");
    btn.disabled = true;
    btn.innerHTML = `<span class="loading"></span> Kaydediliyor...`;

    const formData = new FormData();
    formData.append('action', 'saveIsletme');
    formData.append('isletmeciId', userId);
    formData.append('isletmeAdi', isletmeAdi);
    formData.append('ulke', 'Türkiye');
    formData.append('il', ilAd);
    formData.append('ilce', ilceAd);
    formData.append('mahalle', mahalleAd);
    formData.append('cadde', document.getElementById('cadde').value.trim());
    formData.append('sokak', document.getElementById('sokak').value.trim());
    formData.append('binaAdi', document.getElementById('binaAdi').value.trim());
    formData.append('kapiNo', document.getElementById('kapiNo').value.trim());
    formData.append('kat', document.getElementById('kat').value.trim());
    formData.append('daire', document.getElementById('daire').value.trim());
    formData.append('hitap', hitap);

    try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
        const result = await response.json();

        if (result.success) {
            showResult('İşletme başarıyla kaydedildi!', 'success');
            setTimeout(() => {
                window.location.href = "Isletme.html";
            }, 1500);
        } else {
            showResult('Hata: ' + result.message, 'error');
            btn.disabled = false;
            btn.innerHTML = `<i class="fa-solid fa-save"></i> Kaydet`;
        }
    } catch (err) {
        showResult('Bağlantı hatası!', 'error');
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-save"></i> Kaydet`;
    }

    return false;
}

function showResult(msg, type) {
    const div = document.getElementById('result');
    div.textContent = msg;
    div.className = type;
    div.style.display = 'block';
}
</script>

</body>
</html>
